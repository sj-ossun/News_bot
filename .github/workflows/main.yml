name: Daily News Bot

on:
  schedule:
    # 매일 아침 7시 (UTC 기준이라 9를 빼야 함. 즉 밤 10시에 돌리면 한국 아침 7시)
    - cron: '0 22 * * *' 
  workflow_dispatch: # 수동으로도 실행해볼 수 있게 하는 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install feedparser requests
          
      - name: Run Bot
        env:
          # 위에서 설정한 비밀 값들을 파이썬으로 연결
          MY_KEY: ${{ secrets.GEMINI_API_KEY }}
          MY_EMAIL: ${{ secrets.EMAIL_USER }}
          APP_PASSWORD: ${{ secrets.EMAIL_PASS }}
        run: python news_bot.py
